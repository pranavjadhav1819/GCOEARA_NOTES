<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — GCOEARA Notes Catalog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="site-nav"></div>

  <div class="container">
    <div class="form-card">
      <h2>Log in</h2>
      <p class="sub">Log in to upload notes, PYQs or important questions.</p>

      <div class="alert alert-error hidden" id="form-alert"></div>

      <form id="login-form">
        <div class="field">
          <label for="login-email">College / personal email</label>
          <input type="email" id="login-email" required autocomplete="email" />
        </div>
        <div class="field">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary" id="login-submit-btn" style="width:100%;">Log in</button>
      </form>

      <p class="form-footer-note">New here? <a href="register.html">Create an account</a></p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
