<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register – GCOEARA Notes Catalog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 0.75rem 1rem;
      background: #fff;
      color: #3c4043;
      border: 1.5px solid #dadce0;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      margin-bottom: 0.5rem;
    }
    .google-btn:hover {
      background: #f8f9fa;
      box-shadow: 0 1px 6px rgba(60,64,67,0.2);
    }
    .google-btn img {
      width: 20px;
      height: 20px;
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 1.2rem 0;
      color: #999;
      font-size: 0.85rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e0e0e0;
    }
  </style>
</head>
<body>
  <div id="site-nav"></div>

  <div class="container">
    <div class="form-card">
      <h2>Create an account</h2>
      <p class="sub">Takes a minute. Needed only to upload — browsing and downloads stay open to everyone.</p>

      <div class="alert alert-error hidden" id="form-alert"></div>

      <!-- Google Register Button -->
      <button class="google-btn" onclick="signInWithGoogle()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
        Continue with Google
      </button>

      <div class="divider">OR</div>

      <form id="register-form">
        <div class="field">
          <label for="reg-name">Full name</label>
          <input type="text" id="reg-name" required autocomplete="name" />
        </div>
        <div class="field">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" required autocomplete="email" />
        </div>
        <div class="field">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" required minlength="6" autocomplete="new-password" />
        </div>
        <div class="field-row">
          <div class="field">
            <label for="reg-branch">Branch (optional)</label>
            <select id="reg-branch"></select>
          </div>
          <div class="field">
            <label for="reg-year">Year (optional)</label>
            <select id="reg-year"></select>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" id="register-submit-btn" style="width:100%;">Create account</button>
      </form>

      <p class="form-footer-note">Already have an account? <a href="login.html">Log in</a></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
