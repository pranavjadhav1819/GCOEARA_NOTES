<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register – GCOEARA Notes Catalog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 0.75rem 1rem;
      background: #fff;
      color: #3c4043;
      border: 1.5px solid #dadce0;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      margin-bottom: 0.5rem;
    }
    .google-btn:hover {
      background: #f8f9fa;
      box-shadow: 0 1px 6px rgba(60,64,67,0.2);
    }
    .google-btn img {
      width: 20px;
      height: 20px;
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 1.2rem 0;
      color: #999;
      font-size: 0.85rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e0e0e0;
    }
  </style>
</head>
<body>
  <div id="site-nav"></div>

  <div class="container">
    <div class="form-card">
      <h2>Create an account</h2>
      <p class="sub">Takes a minute. Needed only to upload — browsing and downloads stay open to everyone.</p>

      <div class="alert alert-error hidden" id="form-alert"></div>

      <!-- Google Register Button -->
      <button class="google-btn" onclick="signInWithGoogle()">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.93 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continue with Google
      </button>

      <div class="divider">OR</div>

      <form id="register-form">
        <div class="field">
          <label for="reg-name">Full name</label>
          <input type="text" id="reg-name" required autocomplete="name" />
        </div>
        <div class="field">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" required autocomplete="email" />
        </div>
        <div class="field">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" required minlength="6" autocomplete="new-password" />
        </div>
        <div class="field-row">
          <div class="field">
            <label for="reg-branch">Branch (optional)</label>
            <select id="reg-branch"></select>
          </div>
          <div class="field">
            <label for="reg-year">Year (optional)</label>
            <select id="reg-year"></select>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" id="register-submit-btn" style="width:100%;">Create account</button>
      </form>

      <p class="form-footer-note">Already have an account? <a href="login.html">Log in</a></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
